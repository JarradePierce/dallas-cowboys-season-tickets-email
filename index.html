<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="x-apple-disable-message-reformatting">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Email Title</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:AllowPNG/>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style>
        /* Global resets for consistent rendering */
        html, body { margin: 0 auto !important; padding: 0 !important; height: 100% !important; width: 100% !important; }
        * { -ms-text-size-adjust: 100%; -webkit-text-size-adjust: 100%; }
        div[style*="margin: 16px 0;"] { margin: 0 !important; }
        #bodyTable { height: 100% !important; margin: 0; padding: 0; width: 100% !important; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4;">

    <!-- Visually hidden preview text for inbox entry -->
    <div style="display: none; max-height: 0px; overflow: hidden;">
        This is the sneak peek text that shows up in the inbox.
    </div>

    <!-- Main wrapper table acting as the body -->
    <table id="bodyTable" role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f4f4;">
        <tr>
            <td align="center" valign="top">
                
                <!-- Email Content Container (usually capped at 600px wide) -->
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #ffffff; margin: 20px auto;">
                    <tr>
                        <td style="padding: 40px; font-family: sans-serif; font-size: 16px; line-height: 1.5; color: #333333;">
                            
                            <h1 style="margin-top: 0; font-size: 24px;">Hello There!</h1>
                            <p style="margin-bottom: 0;">This layout uses tables to ensure it scales perfectly across Outlook, Gmail, and mobile apps.</p>
                        
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>
</html>
